name: Florida

on:
  workflow_dispatch:
  push:
    branches: ["main", "ci"]
    paths:
      - ".github/workflows/build.yml"
      - "patches/**"

jobs: 
  check_version:
    runs-on: ubuntu-22.04
    outputs:
      FRIDA_VERSION: ${{ steps.check.outputs.FRIDA_VERSION }}
      SHOULD_BUILD: ${{ steps.check.outputs.SHOULD_BUILD }}
    steps:
      - name: Check Frida Releases
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_VER=$(gh api repos/frida/frida/releases/latest --jq '.tag_name')
          echo "FRIDA_VERSION=$LATEST_VER" >> $GITHUB_OUTPUT

          if gh release view "$LATEST_VER" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            EXISTS=true
          else
            EXISTS=false
          fi

          if [ "$EXISTS" = "true" ]; then
            echo "Re-release: Remove the old release and rebuild"
            gh release delete "$LATEST_VER" --repo "${{ github.repository }}" --yes --cleanup-tag
            echo "SHOULD_BUILD=true" >> $GITHUB_OUTPUT
          else
            echo "New version triggers build"
            echo "SHOULD_BUILD=true" >> $GITHUB_OUTPUT
          fi

  create_release:
    needs: check_version
    runs-on: ubuntu-22.04
    if: needs.check_version.outputs.SHOULD_BUILD == 'true'
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ needs.check_version.outputs.FRIDA_VERSION }}"
          name: "${{ needs.check_version.outputs.FRIDA_VERSION }}"
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  android_build:
    needs: [check_version, create_release]
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        arch: [android-arm, android-arm64, android-x86, android-x86_64]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r29
          local-cache: false
          link-to-sdk: true

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          sudo apt-get update && DEBIAN_FRONTEND=noninteractive sudo apt-get install -y \
            build-essential tree ninja-build gcc-multilib g++-multilib lib32stdc++-9-dev \
            flex bison ruby ruby-dev python3-requests python3-setuptools python3-dev python3-pip libc6-dev libc6-dev-i386
          sudo gem install fpm -v 1.11.0 --no-document
          python3 -m pip install lief graphlib

      - name: Build Frida for ${{ matrix.arch }}
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          export ANDROID_NDK_ROOT=${{ steps.setup-ndk.outputs.ndk-path }}
          
          git clone --recurse-submodules https://github.com/frida/frida
          cd frida

          for path in "${{ github.workspace }}/patches"/*; do
            [ -d "$path" ] || continue
            name=$(basename "$path")
            echo "Applying patches for $name"
            if [ -d "subprojects/$name" ]; then
              (cd "subprojects/$name" && git am "$path"/*.patch)
            fi
          done

          ./configure --host=${{ matrix.arch }}
          make

      - name: Package artifacts
        run: |
          ARCH="${{ matrix.arch }}"
          VER="${{ needs.check_version.outputs.FRIDA_VERSION }}"
          mkdir -p dist

          BUILD_DIR="frida/build"

          SERVER_BIN=$(find "$BUILD_DIR" -type f -name "frida-server" | head -n 1)
          INJECT_BIN=$(find "$BUILD_DIR" -type f -name "frida-inject" | head -n 1)
          GADGET_SO=$(find "$BUILD_DIR" -type f -name "frida-gadget.so" | head -n 1)
          GUMJS_A=$(find "$BUILD_DIR" -type f -name "libfrida-gumjs-1.0.a" | head -n 1)

          [ -f "$SERVER_BIN" ] && gzip -c "$SERVER_BIN" > "dist/florida-server-$VER-$ARCH.gz"
          [ -f "$INJECT_BIN" ] && gzip -c "$INJECT_BIN" > "dist/florida-inject-$VER-$ARCH.gz"
          [ -f "$GADGET_SO" ] && gzip -c "$GADGET_SO" > "dist/florida-gadget-$VER-$ARCH.so.gz"
          [ -f "$GUMJS_A" ] && gzip -c "$GUMJS_A" > "dist/florida-gumjs-$VER-$ARCH.a.gz"

      - name: Upload Release Assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.check_version.outputs.FRIDA_VERSION }}" dist/* --clobber